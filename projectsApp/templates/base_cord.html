{% load static %}

<!DOCTYPE html>
<html class="no-js h-100" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>{% block title %}{% endblock %}</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="{% static 'favicon/favicon.ico' %}"
    />
    <link
      href="https://use.fontawesome.com/releases/v5.0.6/css/all.css"
      rel="stylesheet"
    />
    <!-- Include jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap JS (jQuery dependency included) -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>

    <!-- Bootstrap CSS -->
    <link
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Optional theme -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap-theme.min.css"
      integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp"
      crossorigin="anonymous"
    />

    <!--<script async defer src="https://buttons.github.io/buttons.js"></script>-->
    <style>
      body {
        font-family: "Roboto", sans-serif;
        margin: 0;
        padding: 0;
      }

      header {
        background-color: #007bff;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-align: center;
        padding: 10px 20px;
        z-index: 20;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60px;
      }
      header .left {
        display: flex;
        align-items: center;
      }

      header .logo {
        width: 50px;
        height: 50px;
        margin-right: 10px;
        border-radius: 50%;
      }

      header .profile-pic {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        margin-right: 10px;
      }

      /* Sidebar positioning and width */
      .sidebar {
        position: fixed;
        top: 20px; /* Adjust based on header height */
        left: 0;
        width: 240px; /* Adjust as needed */
        height: 100vh;
        background-color: #647c94;
        border-right: 1px solid #1d1d1d;
        padding: 10px;
        overflow-x: hidden;
      }

      /* Sidebar links */
      .sidebar .nav-link {
        font-weight: 700;
        color: #f7f7f7;
        padding: 10px 12px;
        border-radius: 8px;
        transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      }

      .sidebar .nav-link:hover,
      .sidebar .nav-link:focus {
        color: #ffffff;
        background-color: rgba(255, 255, 255, 0.12);
      }

      .sidebar .nav-link.active {
        color: #ffffff;
        background-color: rgba(7, 141, 244, 0.14);
        border-left: 4px solid #ffd54f;
        padding-left: 8px;
      }

      .sidebar .nav-link[aria-expanded="true"] {
        background-color: rgba(255, 255, 255, 0.08);
      }

      .sidebar .nav-link[aria-expanded="true"] .fas.fa-chevron-down {
        transform: rotate(180deg);
        transition: transform 0.25s ease;
      }

      .sidebar .nav-item .collapse .nav-link {
        font-weight: 600;
        color: #644040;
        padding-left: 1.9rem;
        padding-right: 12px;
        font-size: 0.95rem;
        border-radius: 8px;
      }

      .sidebar .nav-item .collapse .nav-link:hover,
      .sidebar .nav-item .collapse .nav-link:focus {
        background-color: rgba(255, 255, 255, 0.08);
      }

      .sidebar .nav-item .collapse .nav-link.active {
        color: #070707;
        background-color: rgba(255, 255, 255, 0.18);
        border-left: 4px solid #ffcc80;
        padding-left: 1.5rem;
      }

      .sidebar .nav-item + .nav-item {
        margin-top: 6px;
      }

      .sidebar .navbar-toggler {
        position: absolute;
        top: 15px;
        right: 15px;
      }

      /* Collapsible content (optional) */
      @media (max-width: 768px) {
        .sidebar .collapse {
          display: none;
        }

        .sidebar .navbar-toggler {
          display: block;
        }
      }
      #unread-count {
        position: fixed;
        right: 12px;
        color: white;
        font-size: 12px;
        font-weight: bold;
        border-radius: 50%;
        padding: 2px 5px;
      }
      #notifications {
        width: 40px;
        height: 40px;
        background: #fff;
        border-radius: 50%;
        box-sizing: border-box;
        text-align: center;
        color: #007bff;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-md-3">
            <div class="left">
              <img
                src="{% static 'images/logo.jpg' %}"
                alt="Logo"
                class="logo"
              />
              <h1>SPMS</h1>
            </div>
          </div>
          <div class="col-md-9 d-flex justify-content-end">
            <div class="row align-items-center">
              <div class="col-auto">
                <span class="username mb-3" style="padding: 10px">
                  Hello,
                  <strong>
                    {% if request.user.is_authenticated %}
                      {% if request.user.is_staff %}
                        {{ request.user.username }},
                      {% else %}
                        {{ request.user.name }},
                      {% endif %}
                    {% else %}
                      Guest,
                    {% endif %}
                  </strong>
                  Welcome.
                </span>
                <img
                  src="{% static 'images/profile.png'%}"
                  alt="Profile Picture"
                  class="profile-pic"
                />
              </div>
              <div class="col-auto">
                <a
                  href="{% url 'logout' %}"
                  class="btn btn-warning"
                  style="padding: 5px"
                  >Logout</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
    {% block content %} {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
